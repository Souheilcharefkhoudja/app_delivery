<title>Nutsa · Livraisons</title>
<style>
  /* ═══════════════════════════════════════════════════════════
     DESIGN SYSTEM
     ═══════════════════════════════════════════════════════════ */
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-2: #F4F4EF;
    --surface-3: #ECECE5;
    --ink: #0F1F14;
    --ink-2: #4B5563;
    --ink-3: #94A3B8;
    --line: #E5E7EB;
    --line-2: #F1F1EC;
    --brand: #166534;
    --brand-2: #22C55E;
    --brand-soft: #ECFDF3;
    --danger: #DC2626;
    --danger-2: #EF4444;
    --danger-soft: #FEF2F2;
    --warn: #D97706;
    --warn-2: #F59E0B;
    --warn-soft: #FFFBEB;
    --info: #0284C7;
    --info-2: #0EA5E9;
    --info-soft: #F0F9FF;
    --shadow-1: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.05);
    --shadow-2: 0 2px 4px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.06);
    --shadow-3: 0 12px 40px rgba(15,23,42,.14);
    --r-xs: 6px;
    --r-sm: 10px;
    --r: 14px;
    --r-lg: 20px;
    --r-xl: 28px;
    --st: env(safe-area-inset-top);
    --sb: env(safe-area-inset-bottom);
    --header-h: 52px;
    --tabs-h: 44px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0A0F0C; --surface: #131A16; --surface-2: #1A211D; --surface-3: #232B27;
      --ink: #F5F5F0; --ink-2: #B8BEC1; --ink-3: #6B7280;
      --line: #232B27; --line-2: #1C2320;
      --brand: #22C55E; --brand-2: #4ADE80; --brand-soft: #0F1F15;
      --danger: #F87171; --danger-2: #FCA5A5; --danger-soft: #1F0E0E;
      --warn: #FBBF24; --warn-2: #FCD34D; --warn-soft: #1F1710;
      --info: #38BDF8; --info-2: #7DD3FC; --info-soft: #0A1922;
      --shadow-1: 0 1px 3px rgba(0,0,0,.3);
      --shadow-2: 0 2px 8px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.2);
      --shadow-3: 0 12px 40px rgba(0,0,0,.6);
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 15px; line-height: 1.45; letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    overscroll-behavior-y: contain; touch-action: manipulation;
  }
  body { min-height: 100vh; padding-bottom: var(--sb); }
  button, input { font: inherit; color: inherit; border: none; background: none; }
  a { color: inherit; text-decoration: none; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum","cv11"; }

  /* ═══════════════════════════════════════════════════════════
     HEADER + STICKY NAV
     ═══════════════════════════════════════════════════════════ */
  .top {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in oklab, var(--bg) 88%, transparent);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-bottom: 1px solid var(--line-2);
  }
  header {
    padding: calc(var(--st) + 10px) 16px 8px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    height: calc(var(--st) + var(--header-h));
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--brand-2), var(--brand));
    display: grid; place-items: center; color: white;
    box-shadow: 0 2px 6px color-mix(in oklab, var(--brand) 40%, transparent);
  }
  .brand-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .brand-sub {
    font-size: 10.5px; color: var(--ink-3); font-weight: 500;
    display: flex; align-items: center; gap: 5px; margin-top: 2px; letter-spacing: 0;
  }
  .live-pulse {
    width: 5px; height: 5px; border-radius: 50%; background: var(--brand-2);
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--brand-2) 25%, transparent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .4; } }

  .top-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--surface-2); color: var(--ink);
    display: grid; place-items: center;
    transition: transform .12s, background .15s;
  }
  .icon-btn:active { transform: scale(.9); background: var(--surface-3); }
  .icon-btn.spin svg { animation: spin 800ms cubic-bezier(.4,0,.2,1); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Date range strip ── */
  .range-strip {
    display: flex; gap: 4px; padding: 0 16px 10px;
    align-items: center; justify-content: flex-start;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .range-strip::-webkit-scrollbar { display: none; }
  .range-strip .range-label {
    font-size: 10.5px; font-weight: 700; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px;
    white-space: nowrap;
  }
  .range-chip {
    padding: 5px 12px; border-radius: 100px;
    font-size: 12px; font-weight: 600;
    background: transparent; color: var(--ink-2);
    border: 1px solid var(--line-2); white-space: nowrap;
    transition: all .15s; cursor: pointer;
  }
  .range-chip:active { transform: scale(.94); }
  .range-chip.active {
    background: var(--ink); color: var(--bg); border-color: var(--ink);
  }

  /* ── Segmented control (iOS style tabs) ── */
  .tabs {
    display: flex; gap: 2px; padding: 4px;
    margin: 0 16px 10px; background: var(--surface-2);
    border-radius: 12px; position: relative;
    height: var(--tabs-h);
  }
  .tab {
    flex: 1; padding: 0 10px; border-radius: 9px;
    font-size: 13px; font-weight: 600; color: var(--ink-2);
    display: flex; align-items: center; justify-content: center; gap: 5px;
    transition: color .2s, transform .12s;
    position: relative; z-index: 2;
    white-space: nowrap;
  }
  .tab .badge-count {
    background: var(--surface-3); padding: 1px 6px; border-radius: 100px;
    font-size: 10.5px; font-weight: 700; min-width: 20px; text-align: center;
    transition: all .2s;
  }
  .tab.active {
    color: var(--ink);
  }
  .tab.active.problems {
    color: var(--danger);
  }
  .tab.active .badge-count {
    background: color-mix(in oklab, currentColor 12%, transparent);
    color: currentColor;
  }
  .tab-slider {
    position: absolute; top: 4px; bottom: 4px; z-index: 1;
    background: var(--surface); border-radius: 9px;
    box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 2px 8px rgba(15,23,42,.04);
    transition: left .28s cubic-bezier(.32,.72,0,1), width .28s cubic-bezier(.32,.72,0,1);
    left: 4px; width: 60px;
  }

  /* ═══════════════════════════════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════════════════════════════ */
  main { max-width: 720px; margin: 0 auto; padding: 12px 16px 32px; }

  /* ── Search ── */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--ink-3); pointer-events: none;
  }
  .search-wrap input {
    width: 100%; padding: 11px 42px 11px 42px;
    background: var(--surface-2); border: 1.5px solid transparent;
    border-radius: 12px; font-size: 14px; color: var(--ink);
    outline: none; transition: border-color .15s, background .15s;
  }
  .search-wrap input::placeholder { color: var(--ink-3); }
  .search-wrap input:focus {
    background: var(--surface); border-color: var(--brand);
  }
  .clear-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: var(--surface-3); width: 26px; height: 26px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    color: var(--ink-2);
  }
  .clear-btn.show { display: flex; }

  /* ── Reason breakdown strip ── */
  .reasons {
    display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding: 2px 16px 6px; margin: 0 -16px 12px;
    scroll-snap-type: x proximity;
  }
  .reasons::-webkit-scrollbar { display: none; }
  .reason-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 100px; font-size: 12px; font-weight: 600;
    white-space: nowrap; scroll-snap-align: start;
    background: var(--surface); border: 1px solid var(--line-2);
    color: var(--ink-2); transition: all .15s;
  }
  .reason-pill .n {
    background: var(--surface-2); padding: 1px 6px; border-radius: 100px;
    font-size: 11px; font-weight: 700;
  }
  .reason-pill:active { transform: scale(.96); }
  .reason-pill.danger { color: var(--danger); border-color: color-mix(in oklab, var(--danger) 25%, transparent); }
  .reason-pill.danger .n { background: var(--danger-soft); color: var(--danger); }
  .reason-pill.warn { color: var(--warn); border-color: color-mix(in oklab, var(--warn) 25%, transparent); }
  .reason-pill.warn .n { background: var(--warn-soft); color: var(--warn); }
  .reason-pill.info { color: var(--info); border-color: color-mix(in oklab, var(--info) 25%, transparent); }
  .reason-pill.info .n { background: var(--info-soft); color: var(--info); }
  .reason-pill.active {
    background: var(--ink); color: var(--bg); border-color: var(--ink);
  }
  .reason-pill.active .n { background: color-mix(in oklab, var(--bg) 25%, transparent); color: var(--bg); }

  /* ── Section header ── */
  .sec {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 4px 0 10px; padding: 0 2px;
  }
  .sec h2 {
    font-size: 11px; font-weight: 700; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .sec-count { font-size: 12px; font-weight: 600; color: var(--ink-3); }

  /* ═══════════════════════════════════════════════════════════
     ORDER CARDS
     ═══════════════════════════════════════════════════════════ */
  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card {
    background: var(--surface); border: 1px solid var(--line-2);
    border-radius: var(--r); padding: 12px 14px;
    position: relative; overflow: hidden;
    animation: cardIn .35s cubic-bezier(.2,.8,.2,1) backwards;
    transition: transform .12s, border-color .15s;
    cursor: pointer;
  }
  .card:active { transform: scale(.985); }
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .card.problem { border-color: color-mix(in oklab, var(--danger) 25%, var(--line)); }
  .card.problem::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--danger);
  }
  .card.problem.warn { border-color: color-mix(in oklab, var(--warn) 30%, var(--line)); }
  .card.problem.warn::before { background: var(--warn); }
  .card.problem.info { border-color: color-mix(in oklab, var(--info) 30%, var(--line)); }
  .card.problem.info::before { background: var(--info); }

  .card-reason {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700; margin-bottom: 8px;
    letter-spacing: -0.005em;
  }
  .card-reason .r-label { text-transform: uppercase; letter-spacing: 0.04em; font-size: 10.5px; }
  .card-reason .r-raw {
    font-weight: 500; color: var(--ink-2); font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1;
    padding-left: 6px; border-left: 1.5px solid currentColor; opacity: .8;
  }
  .card.problem .card-reason { color: var(--danger); }
  .card.problem.warn .card-reason { color: var(--warn); }
  .card.problem.info .card-reason { color: var(--info); }

  .card-head {
    display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
  }
  .card-ref { font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
  .card-total { font-weight: 700; font-size: 14px; white-space: nowrap; }
  .card-total .cur { font-size: 10.5px; color: var(--ink-3); font-weight: 600; margin-left: 2px; }

  .card-body { display: flex; align-items: center; gap: 8px; margin-top: 3px; font-size: 13.5px; font-weight: 500; }
  .card-meta {
    display: flex; align-items: center; gap: 5px; margin-top: 4px;
    font-size: 12px; color: var(--ink-3); flex-wrap: wrap;
  }
  .card-meta > span { display: inline-flex; align-items: center; gap: 3px; }
  .card-meta .sep { opacity: .5; }
  .card-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); padding: 2px 7px; border-radius: 100px;
    font-size: 10.5px; font-weight: 600; color: var(--ink-2);
    letter-spacing: 0.01em;
  }
  .card-tag.livre { background: var(--brand-soft); color: var(--brand); }
  .card-tag.confirmed { background: var(--brand-soft); color: var(--brand); }
  .card-tag.transit { background: var(--info-soft); color: var(--info); }
  .card-tag.hub { background: color-mix(in oklab, var(--info) 8%, transparent); color: var(--info); }
  .card-tag.prep { background: var(--warn-soft); color: var(--warn); }
  .card-tag.echec { background: var(--danger-soft); color: var(--danger); }
  .card-tag.retour { background: var(--danger-soft); color: var(--danger); }
  .card-tag.annule { background: var(--danger-soft); color: var(--danger); }
  .card-tag.pending { background: var(--warn-soft); color: var(--warn); }
  .card-tag.noanswer { background: var(--warn-soft); color: var(--warn); }
  .card-tag.callback { background: color-mix(in oklab, #A855F7 12%, transparent); color: #9333EA; }
  .card-tag.none { background: var(--surface-2); color: var(--ink-3); }

  .card-chevron {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    color: var(--ink-3); opacity: 0; transition: opacity .15s;
  }
  .card:hover .card-chevron { opacity: 1; }

  .card-actions {
    display: flex; gap: 6px; margin-top: 10px; padding-top: 10px;
    border-top: 1px dashed var(--line-2);
  }
  .card-action {
    flex: 1; padding: 9px 10px; border-radius: 10px;
    background: color-mix(in oklab, var(--brand) 10%, transparent);
    color: var(--brand); border: 1px solid color-mix(in oklab, var(--brand) 22%, transparent);
    font-size: 12.5px; font-weight: 700; letter-spacing: -0.005em;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .15s; cursor: pointer;
  }
  .card-action:active { transform: scale(.96); background: color-mix(in oklab, var(--brand) 18%, transparent); }
  .card-action svg { width: 13px; height: 13px; }

  .toast .undo {
    margin-left: 14px; padding: 3px 10px; border-radius: 100px;
    background: color-mix(in oklab, var(--bg) 15%, transparent);
    color: var(--brand-2); font-weight: 700; font-size: 12.5px;
    cursor: pointer; border: none;
  }

  /* ═══════════════════════════════════════════════════════════
     STATES
     ═══════════════════════════════════════════════════════════ */
  .empty { text-align: center; padding: 60px 24px; color: var(--ink-3); }
  .empty .icon { width: 56px; height: 56px; border-radius: 16px; background: var(--surface-2); display: grid; place-items: center; margin: 0 auto 14px; color: var(--ink-3); }
  .empty h3 { font-size: 15px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; letter-spacing: -0.01em; }
  .empty p { font-size: 13px; max-width: 260px; margin: 0 auto; line-height: 1.5; }

  .skel { background: linear-gradient(90deg, var(--surface-2) 0%, var(--line-2) 50%, var(--surface-2) 100%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .skel-card { background: var(--surface); border: 1px solid var(--line-2); border-radius: var(--r); padding: 14px; margin-bottom: 8px; }

  .err-card {
    background: var(--danger-soft); border: 1px solid color-mix(in oklab, var(--danger) 25%, transparent);
    border-radius: var(--r); padding: 14px 16px; margin: 12px 0; color: var(--danger);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .err-card .msg { font-size: 13px; font-weight: 500; line-height: 1.5; flex: 1; }
  .err-card button { background: transparent; border: 1px solid currentColor; border-radius: 100px; padding: 5px 12px; font-size: 12px; font-weight: 600; margin-top: 6px; margin-right: 6px; }

  .load-more-sentinel {
    padding: 20px; text-align: center;
    color: var(--ink-3); font-size: 12px; font-weight: 500;
  }
  .load-more-sentinel .dots {
    display: inline-flex; gap: 3px; margin-right: 8px; vertical-align: -1px;
  }
  .load-more-sentinel .dots span {
    width: 4px; height: 4px; background: var(--ink-3); border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .load-more-sentinel .dots span:nth-child(2) { animation-delay: .15s; }
  .load-more-sentinel .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-4px); opacity: 1; } }

  /* ═══════════════════════════════════════════════════════════
     DETAIL SHEET
     ═══════════════════════════════════════════════════════════ */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 51;
    background: var(--surface); color: var(--ink);
    border-radius: 24px 24px 0 0;
    max-height: 90vh; overflow-y: auto;
    padding: 6px 20px calc(var(--sb) + 24px);
    transform: translateY(101%);
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
    box-shadow: var(--shadow-3);
  }
  .sheet.open { transform: none; }
  .sheet-grab { width: 36px; height: 4px; background: var(--line); border-radius: 100px; margin: 6px auto 18px; }
  .sheet-hero {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    margin-bottom: 6px;
  }
  .sheet-hero .left h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  .sheet-hero .left .who { font-size: 14px; color: var(--ink-2); margin-top: 4px; font-weight: 500; }
  .sheet-hero .amt { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .sheet-hero .amt .cur { font-size: 11px; color: var(--ink-3); font-weight: 600; margin-left: 3px; }

  .sheet-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0 4px; }

  /* Sheet actions (call, copy) */
  .actions { display: flex; gap: 8px; margin-top: 18px; }
  .action-btn {
    flex: 1; padding: 12px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--surface);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-weight: 600; font-size: 13.5px; letter-spacing: -0.005em;
    transition: transform .12s, background .15s;
  }
  .action-btn:active { transform: scale(.97); background: var(--surface-2); }
  .action-btn.primary { background: var(--brand); color: white; border-color: var(--brand); box-shadow: 0 2px 6px color-mix(in oklab, var(--brand) 30%, transparent); }
  .action-btn.primary:active { background: color-mix(in oklab, var(--brand) 90%, black); }

  /* Detail rows */
  .details {
    margin-top: 22px; padding-top: 4px;
    border-top: 1px solid var(--line-2);
  }
  .drow {
    padding: 12px 0; display: flex; justify-content: space-between; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--line-2);
  }
  .drow:last-child { border-bottom: none; }
  .drow .k { font-size: 11.5px; color: var(--ink-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .drow .v { font-size: 14px; font-weight: 500; text-align: right; max-width: 60%; }
  .drow .v.mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }

  /* Timeline */
  .tl-block {
    margin-top: 22px; padding: 16px; background: var(--surface-2);
    border-radius: 16px;
  }
  .tl-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px; font-weight: 700; color: var(--ink-2);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px;
  }
  .tl-title .live { width: 5px; height: 5px; border-radius: 50%; background: var(--brand-2); box-shadow: 0 0 0 2px color-mix(in oklab, var(--brand-2) 25%, transparent); animation: pulse 2s ease-in-out infinite; }
  .tl-title .attempts {
    margin-left: auto; background: var(--surface); padding: 2px 8px;
    border-radius: 100px; color: var(--danger); font-size: 11px; font-weight: 700;
  }
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before {
    content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px;
    width: 2px; background: var(--line); border-radius: 2px;
  }
  .tl-item { position: relative; padding-bottom: 16px; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-dot {
    position: absolute; left: -22px; top: 4px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--ink-3);
    box-shadow: 0 0 0 3px var(--surface-2);
  }
  .tl-dot.livre { background: var(--brand); }
  .tl-dot.echec, .tl-dot.retour { background: var(--danger); }
  .tl-dot.transit { background: var(--info); }
  .tl-dot.hub { background: var(--info); opacity: .55; }
  .tl-dot.prep { background: var(--warn); }
  .tl-dot.annule { background: var(--ink-3); }
  .tl-item:first-child .tl-dot::after {
    content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid currentColor; opacity: .35;
    animation: ping 2s ease-in-out infinite;
  }
  @keyframes ping { 50% { transform: scale(1.4); opacity: 0; } }
  .tl-date { font-size: 11px; color: var(--ink-3); font-weight: 700; letter-spacing: 0.02em; }
  .tl-status { font-size: 14px; font-weight: 500; margin-top: 3px; line-height: 1.4; }
  .tl-meta { font-size: 12px; color: var(--ink-2); margin-top: 4px; display: flex; align-items: center; gap: 5px; }
  .tl-note { font-size: 12.5px; color: var(--ink-2); margin-top: 5px; font-style: italic; padding: 6px 10px; background: var(--surface); border-radius: 8px; border-left: 2px solid var(--ink-3); }
  .tl-loading, .tl-empty { padding: 16px; text-align: center; color: var(--ink-3); font-size: 13px; }
  .tl-loading .sp {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--line); border-top-color: var(--brand);
    border-radius: 50%; animation: spin 800ms linear infinite;
    vertical-align: -2px; margin-right: 8px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(var(--sb) + 24px); left: 50%;
    transform: translateX(-50%) translateY(24px);
    background: var(--ink); color: var(--bg);
    padding: 10px 18px; border-radius: 100px;
    font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow-3);
    opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══ TOP: Sticky header + tabs ═══ -->
<div class="top">
  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M4 7h16l-2 12H6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M8 7V5a4 4 0 0 1 8 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">Nutsa Livraisons</div>
        <div class="brand-sub"><span class="live-pulse"></span><span id="lastUpdated">Connexion…</span></div>
      </div>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="searchToggle" aria-label="Rechercher">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" id="refreshBtn" aria-label="Actualiser">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
  </header>
  <div class="tabs" id="tabs">
    <div class="tab-slider" id="tabSlider"></div>
    <button class="tab problems" data-tab="probleme">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>
      Problèmes <span class="badge-count" id="cnt-probleme">0</span>
    </button>
    <button class="tab" data-tab="transit">
      Transit <span class="badge-count" id="cnt-transit">0</span>
    </button>
    <button class="tab" data-tab="livre">
      Livrées <span class="badge-count" id="cnt-livre">0</span>
    </button>
    <button class="tab" data-tab="all">
      Toutes <span class="badge-count" id="cnt-all">0</span>
    </button>
  </div>
  <div class="range-strip" id="rangeStrip">
    <span class="range-label">Période</span>
    <button class="range-chip" data-range="7d">7 jours</button>
    <button class="range-chip" data-range="30d">1 mois</button>
    <button class="range-chip" data-range="60d">2 mois</button>
    <button class="range-chip" data-range="90d">3 mois</button>
    <button class="range-chip active" data-range="all">Tout</button>
  </div>
</div>

<main id="content"></main>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
//  BOOTSTRAP — redirect if not configured
// ══════════════════════════════════════════════════════════════
const CFG_KEY = 'nutsa.cfg.v3';
const CACHE_KEY = 'nutsa.cache.v3';
const DISMISS_KEY = 'nutsa.dismissed.v1';

// ══════════════════════════════════════════════════════════════
//  DISMISSED ORDERS — persistent "I've resolved this" list
// ══════════════════════════════════════════════════════════════
const dismissed = {
  get() { try { return JSON.parse(localStorage.getItem(DISMISS_KEY) || '{}'); } catch { return {}; } },
  save(d) { localStorage.setItem(DISMISS_KEY, JSON.stringify(d)); },
  add(id) { const d = this.get(); d[id] = { t: Date.now(), state: '' }; this.save(d); },
  remove(id) { const d = this.get(); delete d[id]; this.save(d); },
  has(id) { return !!this.get()[id]; },
  count() { return Object.keys(this.get()).length; }
};
(function bootstrap() {
  try {
    const cfg = JSON.parse(localStorage.getItem(CFG_KEY) || 'null');
    if (!cfg?.url || !cfg?.token) {
      location.replace('setup.html');
    }
  } catch (e) {
    location.replace('setup.html');
  }
})();

// ══════════════════════════════════════════════════════════════
//  STORE
// ══════════════════════════════════════════════════════════════
const store = {
  getCfg() { try { return JSON.parse(localStorage.getItem(CFG_KEY)); } catch { return null; } },
  clearCfg() { localStorage.removeItem(CFG_KEY); localStorage.removeItem(CACHE_KEY); },
  getCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const p = JSON.parse(raw);
      if (Date.now() - p.t > 24 * 3600 * 1000) return null;
      return p;
    } catch { return null; }
  },
  setCache(data) { try { localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), data })); } catch {} }
};

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
const state = {
  data: null,
  filter: 'probleme',
  reasonFilter: null,
  dateRange: 'all',     // '7d' | '30d' | '60d' | '90d' | 'all'
  search: '',
  showSearch: false,
  loading: false,
  error: null,
  lastFetch: null,
  renderLimit: 40
};

const RANGE_DAYS = { '7d': 7, '30d': 30, '60d': 60, '90d': 90 };
function matchRange(o) {
  if (state.dateRange === 'all') return true;
  if (!o.date) return false;         // undated → hide when a range is set
  const days = RANGE_DAYS[state.dateRange];
  if (!days) return true;
  const cutoff = Date.now() - days * 86400000;
  return new Date(o.date).getTime() >= cutoff;
}

// ══════════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════════
let inflight = null;
async function apiFetch(action, extra = '') {
  const cfg = store.getCfg();
  if (!cfg?.url) throw new Error('Configuration manquante');
  const token = cfg.token ? `&token=${encodeURIComponent(cfg.token)}` : '';
  const url = `${cfg.url}?action=${action}${token}${extra}&_=${Date.now()}`;
  const res = await fetch(url, { cache: 'no-store', redirect: 'follow' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}
async function fetchFeed() {
  if (inflight) return inflight;
  const doIt = async (n) => {
    try { return await apiFetch('feed'); }
    catch (e) {
      if (n < 2) { await new Promise(r => setTimeout(r, 800 * (n + 1))); return doIt(n + 1); }
      throw e;
    }
  };
  inflight = doIt(0).finally(() => { inflight = null; });
  return inflight;
}
async function fetchTracking(tracking) {
  const json = await apiFetch('tracking', `&tracking=${encodeURIComponent(tracking)}`);
  return json.data || json;
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const fmt = n => Number(n || 0).toLocaleString('fr-FR');
const fmtK = n => {
  n = Number(n || 0);
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
  return fmt(n);
};
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const now = new Date();
  const min = Math.floor((now - d) / 60000);
  if (min < 1) return "à l'instant";
  if (min < 60) return `il y a ${min} min`;
  const isToday = d.toDateString() === now.toDateString();
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (isToday) return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  if (d.toDateString() === yest.toDateString()) return `Hier ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const days = Math.floor((now - d) / 86400000);
  if (days < 7) return `il y a ${days} j`;
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}
function fmtFull(v) {
  const d = new Date(v);
  if (isNaN(d)) return String(v);
  return d.toLocaleString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ══════════════════════════════════════════════════════════════
//  CLASSIFICATION
// ══════════════════════════════════════════════════════════════
function classifyStatus(s) {
  const st = String(s || '').trim();
  const map = { 'Livré': 'livre', 'Confirmed': 'confirmed', 'Cancelled': 'annule', 'Pending': 'pending', 'No Answer': 'noanswer', 'Callback': 'callback' };
  return { key: map[st] || 'none', label: st || '—' };
}
function classifyDelivery(raw) {
  const s = String(raw || '').toLowerCase();
  if (!s) return { key: 'none', label: '—' };
  if (/livr[ée]|delivered/.test(s)) return { key: 'livre', label: raw };
  if (/retour|returned|retourn[ée]/.test(s)) return { key: 'retour', label: raw };
  if (/annul|cancel/.test(s)) return { key: 'annule', label: raw };
  if (/echec|échec|failed|tentative|absent|injoignable/.test(s)) return { key: 'echec', label: raw };
  if (/transit|route|cours|shipped|exped|expéd/.test(s)) return { key: 'transit', label: raw };
  if (/centre|hub|depot|dépôt|wilaya/.test(s)) return { key: 'hub', label: raw };
  if (/prep|préparation|preparation|pending|attente/.test(s)) return { key: 'prep', label: raw };
  return { key: 'none', label: raw };
}

const REASONS = [
  { key: 'absent',    label: 'Client absent',      color: 'warn',   patterns: [/absent/i, /ne\s*r[eé]pond\s*pas/i, /injoignable/i, /pas\s*de\s*r[eé]ponse/i, /لا\s*يرد/] },
  { key: 'refus',     label: 'Client refuse',      color: 'danger', patterns: [/refus/i, /rejet/i, /رفض/] },
  { key: 'adresse',   label: 'Adresse incorrecte', color: 'warn',   patterns: [/adresse.*(err|introuv|fauss|incorrect|incompl)/i, /wrong\s*address/i, /عنوان/] },
  { key: 'report',    label: 'Reportée',           color: 'info',   patterns: [/report/i, /reprogramm/i, /rescheduled/i, /مؤجل/] },
  { key: 'tentative', label: 'Tentative échouée',  color: 'warn',   patterns: [/tentative/i, /echec/i, /échec/i, /failed/i, /attempt/i] },
  { key: 'retour',    label: 'Retour au vendeur',  color: 'danger', patterns: [/retour/i, /returned/i, /retourn/i, /رجع/] },
  { key: 'annule',    label: 'Annulation Anderson',color: 'danger', patterns: [/annul/i, /cancel/i, /ملغ/] },
];
function extractReason(o) {
  const raw = String(o.delivery_state || '');
  const st = String(o.status || '').trim();
  if (!raw && st === 'Cancelled') return { key: 'annule_nutsa', label: 'Annulée par Nutsa', color: 'danger', raw: '' };
  if (!raw) return null;
  for (const r of REASONS) for (const p of r.patterns) if (p.test(raw)) return { ...r, raw };
  return { key: 'autre', label: 'Autre problème', color: 'warn', raw };
}
function isProblem(o) {
  const st = String(o.status || '').trim();
  const ds = String(o.delivery_state || '').toLowerCase();
  if (st === 'Cancelled') return true;
  if (!ds) return false;
  return /retour|echec|échec|failed|tentative|absent|injoignable|refus|annul|adresse.*(err|introuv|fauss)|ne\s*répond|لا\s*يرد|رفض|رجع/i.test(ds);
}
function isTransit(o) {
  const k = classifyDelivery(o.delivery_state).key;
  return k === 'transit' || k === 'hub';
}
function isLivre(o) {
  return String(o.status).trim() === 'Livré' || classifyDelivery(o.delivery_state).key === 'livre';
}

function matchFilter(o) {
  switch (state.filter) {
    case 'all': return true;
    case 'transit': return isTransit(o);
    case 'livre': return isLivre(o);
    case 'probleme': {
      if (!isProblem(o)) return false;
      if (dismissed.has(o.order)) return false;   // hide resolved alerts
      if (state.reasonFilter) return (extractReason(o) || {}).key === state.reasonFilter;
      return true;
    }
  }
  return true;
}
function matchSearch(o) {
  if (!state.search) return true;
  const q = state.search.toLowerCase();
  return String(o.order || '').toLowerCase().includes(q)
    || String(o.name || '').toLowerCase().includes(q)
    || String(o.phone || '').toLowerCase().includes(q)
    || String(o.commune || '').toLowerCase().includes(q);
}

// ══════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════
function render() {
  const c = $('content');

  if (state.error && !state.data) {
    c.innerHTML = `
      <div class="err-card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5"/></svg>
        <div class="msg">
          <strong>Impossible de charger.</strong><br>${escapeHtml(state.error)}
          <div style="margin-top:10px">
            <button onclick="refresh()">Réessayer</button>
            <button onclick="resetApp()">Reconfigurer</button>
          </div>
        </div>
      </div>`;
    updateTabCounts({});
    return;
  }

  if (state.loading && !state.data) {
    c.innerHTML = `
      ${Array(6).fill(0).map(() => `
        <div class="skel-card">
          <div class="skel" style="height:14px;width:60%"></div>
          <div class="skel" style="height:12px;width:80%;margin-top:8px"></div>
          <div class="skel" style="height:10px;width:40%;margin-top:6px"></div>
        </div>`).join('')}`;
    return;
  }
  if (!state.data) return;

  const orders = (state.data.sheet?.recent_orders || []).filter(matchRange);

  // Compute totals for tabs (probleme count excludes resolved ones)
  const counts = {
    all: orders.length,
    probleme: orders.filter(o => isProblem(o) && !dismissed.has(o.order)).length,
    transit: orders.filter(isTransit).length,
    livre: orders.filter(isLivre).length
  };
  updateTabCounts(counts);

  // Reason breakdown (also excludes resolved)
  const problemOrders = orders.filter(o => isProblem(o) && !dismissed.has(o.order));
  const reasonCounts = {};
  problemOrders.forEach(o => {
    const r = extractReason(o);
    if (!r) return;
    if (!reasonCounts[r.key]) reasonCounts[r.key] = { label: r.label, color: r.color, count: 0 };
    reasonCounts[r.key].count++;
  });
  const reasons = Object.entries(reasonCounts).map(([k, v]) => ({ key: k, ...v })).sort((a, b) => b.count - a.count);

  const filtered = orders.filter(o => matchFilter(o) && matchSearch(o));
  const visible = filtered.slice(0, state.renderLimit);
  const hasMore = filtered.length > visible.length;

  c.innerHTML = `
    ${state.showSearch ? `
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="search" placeholder="N° commande, nom, téléphone, commune…"
               value="${escapeHtml(state.search)}" autocomplete="off" enterkeyhint="search">
        <button class="clear-btn ${state.search ? 'show' : ''}" onclick="clearSearch()" aria-label="Effacer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    ` : ''}

    ${state.filter === 'probleme' && reasons.length > 0 ? `
      <div class="reasons">
        <button class="reason-pill ${!state.reasonFilter ? 'active' : ''}" onclick="setReason(null)">
          Tous <span class="n">${counts.probleme}</span>
        </button>
        ${reasons.map(r => `
          <button class="reason-pill ${r.color} ${state.reasonFilter === r.key ? 'active' : ''}" onclick="setReason('${r.key}')">
            ${escapeHtml(r.label)} <span class="n">${r.count}</span>
          </button>
        `).join('')}
      </div>
    ` : ''}

    <div class="sec">
      <h2>${state.filter === 'probleme' ? 'À investiguer' : 'Commandes'}</h2>
      <span class="sec-count num">${filtered.length}</span>
    </div>

    <div class="cards">
      ${filtered.length === 0 ? emptyState() : visible.map((o, i) => cardHTML(o, i)).join('')}
    </div>

    ${hasMore ? `<div class="load-more-sentinel" id="lm">
      <span class="dots"><span></span><span></span><span></span></span>
      Chargement… <span class="num">(${visible.length} / ${filtered.length})</span>
    </div>` : ''}
  `;

  wireEvents();
  positionTabSlider();
}

function cardHTML(o, idx) {
  const reason = extractReason(o);
  const problem = isProblem(o);
  const sCls = classifyStatus(o.status);
  const dCls = classifyDelivery(o.delivery_state);
  const problemColor = problem ? (reason?.color || 'danger') : '';

  return `
    <div class="card ${problem ? 'problem ' + problemColor : ''}" style="animation-delay:${Math.min(idx * 18, 240)}ms" onclick="openSheet(${idx})">
      ${reason ? `
        <div class="card-reason">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/>
          </svg>
          <span class="r-label">${escapeHtml(reason.label)}</span>
          ${reason.raw ? `<span class="r-raw">${escapeHtml(reason.raw)}</span>` : ''}
        </div>
      ` : ''}
      <div class="card-head">
        <div class="card-ref">${escapeHtml(o.order || '—')}</div>
        <div class="card-total num">${fmt(o.total)}<span class="cur">DA</span></div>
      </div>
      <div class="card-body">${escapeHtml(o.name || 'Sans nom')}</div>
      <div class="card-meta">
        <span>${escapeHtml(o.commune || '—')}${o.wilaya ? ', ' + escapeHtml(o.wilaya) : ''}</span>
        ${o.date ? `<span class="sep">·</span><span>${escapeHtml(timeAgo(o.date))}</span>` : ''}
        ${o.tracking ? `<span class="sep">·</span><span class="card-tag ${dCls.key}">${escapeHtml(o.delivery_state || 'en cours')}</span>` : `<span class="sep">·</span><span class="card-tag ${sCls.key}">${escapeHtml(sCls.label)}</span>`}
      </div>
      ${problem ? `
        <div class="card-actions">
          <button class="card-action" onclick="resolveOrder('${escapeHtml(o.order).replace(/'/g,"\\'")}', event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            J'ai résolu ce problème
          </button>
        </div>
      ` : ''}
    </div>`;
}

function emptyState() {
  const isProblemView = state.filter === 'probleme';
  return `<div class="empty">
    <div class="icon">
      ${isProblemView
        ? '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
        : '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>'
      }
    </div>
    <h3>${isProblemView ? 'Aucun problème 🎉' : 'Aucune commande'}</h3>
    <p>${state.search ? 'Aucun résultat pour cette recherche.' : isProblemView ? 'Toutes les livraisons se passent bien.' : 'Rien à afficher.'}</p>
  </div>`;
}

function updateTabCounts(counts) {
  ['all', 'probleme', 'transit', 'livre'].forEach(k => {
    const el = $(`cnt-${k}`);
    if (el) el.textContent = counts[k] ?? 0;
  });
}

function positionTabSlider() {
  const active = document.querySelector('.tab.active');
  const slider = $('tabSlider');
  if (!active || !slider) return;
  const containerLeft = active.parentElement.getBoundingClientRect().left;
  const rect = active.getBoundingClientRect();
  slider.style.width = `${rect.width}px`;
  slider.style.left = `${rect.left - containerLeft}px`;
}

// ══════════════════════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════════════════════
function wireEvents() {
  const si = $('searchInput');
  if (si) {
    let t;
    si.addEventListener('input', e => {
      clearTimeout(t);
      const v = e.target.value;
      t = setTimeout(() => {
        state.search = v.trim();
        state.renderLimit = 40;
        render();
        requestAnimationFrame(() => {
          const el = $('searchInput');
          if (el) { el.focus(); el.setSelectionRange(v.length, v.length); }
        });
      }, 140);
    });
    si.focus();
  }
  const lm = $('lm');
  if (lm && 'IntersectionObserver' in window) {
    const io = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) { io.disconnect(); state.renderLimit += 40; render(); }
    }, { rootMargin: '400px' });
    io.observe(lm);
  }
}

function setTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === t));
  state.filter = t;
  state.reasonFilter = null;
  state.renderLimit = 40;
  render();
}
function setReason(k) { state.reasonFilter = k; state.renderLimit = 40; render(); }
function clearSearch() { state.search = ''; state.renderLimit = 40; render(); }

// ══════════════════════════════════════════════════════════════
//  DETAIL SHEET
// ══════════════════════════════════════════════════════════════
const tlCache = new Map();

function openSheet(idx) {
  const orders = state.data?.sheet?.recent_orders || [];
  const visible = orders.filter(o => matchFilter(o) && matchSearch(o));
  const o = visible[idx];
  if (!o) return;

  const reason = extractReason(o);
  const sCls = classifyStatus(o.status);
  const dCls = classifyDelivery(o.delivery_state);

  $('sheet').innerHTML = `
    <div class="sheet-grab"></div>
    <div class="sheet-hero">
      <div class="left">
        <h2>${escapeHtml(o.order || '—')}</h2>
        <div class="who">${escapeHtml(o.name || 'Sans nom')} · ${escapeHtml(o.commune || '—')}</div>
      </div>
      <div class="amt num">${fmt(o.total)}<span class="cur">DA</span></div>
    </div>

    <div class="sheet-tags">
      <span class="card-tag ${sCls.key}">${escapeHtml(sCls.label)}</span>
      ${o.delivery_state ? `<span class="card-tag ${dCls.key}">${escapeHtml(o.delivery_state)}</span>` : ''}
      ${reason ? `<span class="card-tag ${reason.color === 'danger' ? 'echec' : reason.color === 'info' ? 'transit' : 'prep'}">${escapeHtml(reason.label)}</span>` : ''}
    </div>

    ${o.tracking ? `
      <div class="tl-block">
        <div class="tl-title"><span class="live"></span>Historique Anderson<span class="attempts" id="attemptCount" hidden></span></div>
        <div id="timeline-content"><div class="tl-loading"><span class="sp"></span>Chargement depuis Anderson…</div></div>
      </div>
    ` : `<div class="tl-block"><div class="tl-empty">Pas de numéro Anderson pour cette commande.</div></div>`}

    <div class="actions">
      ${o.phone ? `<a class="action-btn primary" href="tel:${encodeURIComponent(o.phone)}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Appeler
      </a>` : ''}
      ${o.tracking ? `<button class="action-btn" onclick="copyText('${escapeHtml(o.tracking)}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copier suivi
      </button>` : ''}
    </div>

    <div class="details">
      <div class="drow"><span class="k">Téléphone</span><span class="v">${escapeHtml(o.phone || '—')}</span></div>
      <div class="drow"><span class="k">Wilaya</span><span class="v">${escapeHtml(o.wilaya || '—')}</span></div>
      <div class="drow"><span class="k">Produits</span><span class="v">${escapeHtml(o.product || '—')}</span></div>
      <div class="drow"><span class="k">Quantité</span><span class="v num">${fmt(o.qty)}</span></div>
      ${o.tracking ? `<div class="drow"><span class="k">Suivi</span><span class="v mono">${escapeHtml(o.tracking)}</span></div>` : ''}
      <div class="drow"><span class="k">Source</span><span class="v" style="text-transform:capitalize">${escapeHtml(o.source || '—')}</span></div>
    </div>
  `;
  $('sheet').classList.add('open');
  $('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (o.tracking) loadTimeline(o.tracking);
}

async function loadTimeline(tracking) {
  const el = () => $('timeline-content');
  try {
    let data;
    if (tlCache.has(tracking) && Date.now() - tlCache.get(tracking).t < 60000) {
      data = tlCache.get(tracking).data;
    } else {
      data = await fetchTracking(tracking);
      tlCache.set(tracking, { t: Date.now(), data });
    }
    const activity = data?.activity || data?.data?.activity || data?.events || [];
    if (!el()) return;
    if (!activity.length) { el().innerHTML = '<div class="tl-empty">Aucun événement pour le moment.</div>'; return; }
    const items = activity.slice().reverse();
    const attemptCount = activity.filter(a => /livreur|driver|tentative|attempt/i.test(String(a.status || a.event || ''))).length;
    if (attemptCount > 0) {
      const ac = $('attemptCount');
      if (ac) { ac.textContent = `${attemptCount} tentative${attemptCount > 1 ? 's' : ''}`; ac.hidden = false; }
    }
    el().innerHTML = `<div class="timeline">${items.map(tlItem).join('')}</div>`;
  } catch (err) {
    if (el()) el().innerHTML = `<div class="tl-empty">Impossible de charger le suivi.<br><span style="font-size:11px">${escapeHtml(err.message)}</span></div>`;
  }
}

function pickField(a, keys) { for (const k of keys) if (a?.[k] != null && a[k] !== '') return a[k]; return ''; }

function tlItem(a) {
  const status = pickField(a, ['status', 'event', 'message', 'description', 'label']) || '';
  const date = pickField(a, ['date', 'created_at', 'event_date', 'timestamp', 'time', 'at']);
  const driver = pickField(a, ['livreur', 'driver', 'driver_name', 'agent', 'user', 'employee']);
  const note = pickField(a, ['note', 'comment', 'remark', 'reason']);
  const center = pickField(a, ['center', 'centre', 'hub', 'wilaya', 'depot']);
  const cls = classifyDelivery(status);
  return `
    <div class="tl-item">
      <div class="tl-dot ${cls.key}"></div>
      ${date ? `<div class="tl-date">${escapeHtml(fmtFull(date))}</div>` : ''}
      <div class="tl-status">${escapeHtml(status || '—')}</div>
      ${driver ? `<div class="tl-meta">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${escapeHtml(String(driver))}
      </div>` : ''}
      ${center ? `<div class="tl-meta">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${escapeHtml(String(center))}
      </div>` : ''}
      ${note ? `<div class="tl-note">« ${escapeHtml(String(note))} »</div>` : ''}
    </div>`;
}

function closeSheet() {
  $('sheet').classList.remove('open');
  $('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

async function copyText(t) {
  try { await navigator.clipboard.writeText(t); toast('Copié ✓'); }
  catch { toast('Impossible de copier'); }
}
function toast(m, undo) {
  const el = $('toast');
  el.innerHTML = escapeHtml(m) + (undo ? ` <button class="undo" onclick="event.stopPropagation();window._undo && window._undo()">Annuler</button>` : '');
  window._undo = undo || null;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.classList.remove('show'); window._undo = null; }, undo ? 4500 : 1800);
}

function resolveOrder(orderId, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  if (!orderId || dismissed.has(orderId)) return;
  dismissed.add(orderId);
  render();
  toast(`« ${orderId} » marqué résolu`, () => {
    dismissed.remove(orderId);
    render();
    toast('Annulé');
  });
}
function resetApp() { store.clearCfg(); location.replace('setup.html'); }

// ══════════════════════════════════════════════════════════════
//  DATA CYCLE
// ══════════════════════════════════════════════════════════════
async function refresh() {
  const btn = $('refreshBtn');
  btn?.classList.add('spin');
  state.loading = true;
  if (!state.data) render();
  try {
    const data = await fetchFeed();
    state.data = data; state.error = null; state.lastFetch = new Date();
    store.setCache(data);
    updateLastFetched();
    render();
  } catch (err) {
    state.error = err.message || 'Erreur réseau';
    if (!state.data) render();
    else toast('Échec de mise à jour');
  } finally {
    state.loading = false;
    setTimeout(() => btn?.classList.remove('spin'), 900);
  }
}
function updateLastFetched() {
  const el = $('lastUpdated');
  if (!el) return;
  if (!state.lastFetch) { el.textContent = 'Connexion…'; return; }
  const t = state.lastFetch;
  el.textContent = `Mis à jour ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════════════════════
//  MOUNT
// ══════════════════════════════════════════════════════════════
function mount() {
  // Wire tabs
  document.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => setTab(el.dataset.tab));
  });
  document.querySelector('.tab[data-tab="probleme"]').classList.add('active');

  // Wire date-range chips
  document.querySelectorAll('.range-chip').forEach(el => {
    el.addEventListener('click', () => {
      state.dateRange = el.dataset.range;
      state.renderLimit = 40;
      document.querySelectorAll('.range-chip').forEach(x => x.classList.toggle('active', x === el));
      render();
    });
  });
  $('refreshBtn').addEventListener('click', refresh);
  $('searchToggle').addEventListener('click', () => {
    state.showSearch = !state.showSearch;
    if (!state.showSearch) state.search = '';
    render();
  });

  // Warm from cache
  const cached = store.getCache();
  if (cached) {
    state.data = cached.data;
    state.lastFetch = new Date(cached.t);
    updateLastFetched();
    render();
  } else {
    state.loading = true;
    render();
  }
  refresh();

  // Auto refresh (visible tab, every 60s)
  setInterval(() => { if (!document.hidden) refresh(); }, 60000);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.lastFetch && Date.now() - state.lastFetch > 30000) refresh();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

  // Pull to refresh
  let sy = 0, pull = false;
  document.addEventListener('touchstart', e => { if (window.scrollY === 0) { sy = e.touches[0].clientY; pull = true; } }, { passive: true });
  document.addEventListener('touchend', e => { if (pull && e.changedTouches[0].clientY - sy > 80) refresh(); pull = false; }, { passive: true });

  window.addEventListener('resize', positionTabSlider);
}

mount();
</script>
