<link rel="manifest" href='data:application/manifest+json,{"name":"Nutsa Livraisons","short_name":"Nutsa","start_url":".","display":"standalone","orientation":"portrait","background_color":"%23FAFAF7","theme_color":"%230F1F14"}'>
<title>Nutsa · Livraisons</title>
<style>
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-2: #F4F4EF;
    --ink: #0F1F14;
    --ink-2: #4B5563;
    --ink-3: #9CA3AF;
    --line: #E5E7EB;
    --line-2: #F1F1EC;
    --brand: #166534;
    --brand-2: #22C55E;
    --brand-soft: #F0FDF4;
    --danger: #DC2626;
    --danger-soft: #FEF2F2;
    --warn: #D97706;
    --warn-soft: #FFFBEB;
    --info: #0284C7;
    --info-soft: #F0F9FF;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04);
    --shadow: 0 1px 3px rgba(15,23,42,.06), 0 8px 24px rgba(15,23,42,.04);
    --shadow-lg: 0 12px 40px rgba(15,23,42,.12);
    --r-sm: 10px;
    --r: 14px;
    --r-lg: 20px;
    --r-xl: 28px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0A0F0C;
      --surface: #131A16;
      --surface-2: #1A211D;
      --ink: #F5F5F0;
      --ink-2: #B8BEC1;
      --ink-3: #6B7280;
      --line: #232B27;
      --line-2: #1C2320;
      --brand: #22C55E;
      --brand-2: #4ADE80;
      --brand-soft: #0A1F12;
      --danger: #F87171;
      --danger-soft: #1F0F0F;
      --warn: #FBBF24;
      --warn-soft: #1F1710;
      --info: #38BDF8;
      --info-soft: #0A1A24;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.2);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.45;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overscroll-behavior-y: contain;
  }
  body { min-height: 100vh; padding-bottom: var(--safe-bottom); }
  button, input { font: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  /* ── Header ─────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in oklab, var(--bg) 85%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line-2);
    padding: calc(var(--safe-top) + 14px) 20px 12px;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .brand-mark { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 32px; height: 32px; border-radius: 9px;
    background: linear-gradient(135deg, var(--brand-2), var(--brand));
    display: grid; place-items: center; color: white; font-size: 16px;
    box-shadow: 0 2px 6px rgba(22,101,52,.25);
  }
  .brand-name { font-weight: 700; font-size: 17px; letter-spacing: -0.02em; }
  .brand-sub { font-size: 11px; color: var(--ink-3); font-weight: 500; margin-top: -2px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--surface-2); color: var(--ink);
    display: grid; place-items: center; cursor: pointer;
    transition: transform .15s, background .15s;
  }
  .icon-btn:active { transform: scale(.92); background: var(--line); }
  .icon-btn.spin svg { animation: spin 800ms cubic-bezier(.4,0,.2,1); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .updated {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--ink-3); margin-top: 6px; font-weight: 500;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand-2); box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand-2) 20%, transparent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .4; } }

  /* ── Layout ─────────────────────────────── */
  main { padding: 16px 16px 40px; max-width: 720px; margin: 0 auto; }
  .stack > * + * { margin-top: 12px; }

  /* ── KPI cards ──────────────────────────── */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi {
    background: var(--surface);
    border-radius: var(--r);
    padding: 14px 14px 12px;
    border: 1px solid var(--line-2);
    position: relative; overflow: hidden;
  }
  .kpi-head { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi-head svg { flex-shrink: 0; opacity: .7; }
  .kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-top: 6px; line-height: 1.05; }
  .kpi-sub { font-size: 12px; color: var(--ink-3); margin-top: 3px; }
  .kpi.accent-brand .kpi-value { color: var(--brand); }
  .kpi.accent-info .kpi-value { color: var(--info); }
  .kpi.accent-warn .kpi-value { color: var(--warn); }
  .kpi.accent-danger .kpi-value { color: var(--danger); }

  /* ── Search ─────────────────────────────── */
  .search-wrap { position: relative; }
  .search-wrap svg.search-icon { position: absolute; top: 50%; left: 14px; transform: translateY(-50%); color: var(--ink-3); pointer-events: none; }
  .search-wrap input {
    width: 100%; padding: 13px 14px 13px 42px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); font-size: 15px; color: var(--ink);
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .search-wrap input::placeholder { color: var(--ink-3); }
  .search-wrap input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 15%, transparent); }
  .clear-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: var(--surface-2); border: none; width: 28px; height: 28px; border-radius: 50%; display: none; place-items: center; cursor: pointer; color: var(--ink-2); }
  .clear-btn.show { display: grid; }

  /* ── Filter chips ───────────────────────── */
  .chips { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 2px 0; margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 100px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    color: var(--ink-2); white-space: nowrap; cursor: pointer;
    transition: all .15s;
  }
  .chip .count { background: var(--surface-2); padding: 1px 7px; border-radius: 100px; font-size: 11px; font-weight: 700; color: var(--ink-2); }
  .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .chip.active .count { background: color-mix(in oklab, var(--bg) 20%, transparent); color: var(--bg); }

  /* ── Section label ──────────────────────── */
  .section { display: flex; align-items: baseline; justify-content: space-between; margin: 20px 0 10px; }
  .section h2 { font-size: 13px; font-weight: 700; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.05em; }
  .section .count-tag { font-size: 12px; color: var(--ink-3); font-weight: 600; }

  /* ── Order cards ────────────────────────── */
  .order-list { display: flex; flex-direction: column; gap: 8px; }
  .order {
    background: var(--surface); border: 1px solid var(--line-2);
    border-radius: var(--r); padding: 14px;
    cursor: pointer; transition: transform .12s, border-color .15s;
    animation: cardIn .35s cubic-bezier(.2,.8,.2,1) backwards;
  }
  .order:active { transform: scale(.98); }
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .order-line-1 { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .order-ref { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; color: var(--ink); }
  .order-total { font-weight: 700; font-size: 14px; color: var(--ink); white-space: nowrap; }
  .order-total .cur { font-size: 11px; color: var(--ink-3); font-weight: 600; margin-left: 3px; }
  .order-line-2 { display: flex; align-items: center; gap: 6px; margin-top: 4px; color: var(--ink); font-size: 14px; font-weight: 500; }
  .order-line-3 { display: flex; align-items: center; gap: 8px; margin-top: 3px; color: var(--ink-3); font-size: 12px; }
  .order-line-3 .dot-sep { color: var(--ink-3); opacity: .6; }
  .order-line-4 { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

  /* ── Badges ─────────────────────────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 9px; border-radius: 100px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.01em; white-space: nowrap;
  }
  .badge svg { width: 10px; height: 10px; }
  .b-livre { background: color-mix(in oklab, var(--brand) 12%, transparent); color: var(--brand); }
  .b-confirmed { background: var(--brand-soft); color: var(--brand); }
  .b-transit { background: var(--info-soft); color: var(--info); }
  .b-hub { background: color-mix(in oklab, var(--info) 10%, transparent); color: var(--info); }
  .b-prep { background: var(--warn-soft); color: var(--warn); }
  .b-echec { background: var(--danger-soft); color: var(--danger); }
  .b-retour { background: var(--danger-soft); color: var(--danger); }
  .b-annule { background: var(--surface-2); color: var(--ink-2); }
  .b-pending { background: var(--warn-soft); color: var(--warn); }
  .b-noanswer { background: var(--warn-soft); color: var(--warn); }
  .b-callback { background: color-mix(in oklab, #A855F7 12%, transparent); color: #9333EA; }
  .b-none { background: var(--surface-2); color: var(--ink-3); }

  /* ── Empty / loading / error ─────────────── */
  .empty { text-align: center; padding: 60px 20px; color: var(--ink-3); }
  .empty .emoji { font-size: 42px; margin-bottom: 12px; opacity: .5; }
  .empty h3 { font-size: 15px; font-weight: 600; color: var(--ink-2); margin-bottom: 4px; }
  .empty p { font-size: 13px; }

  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 0%, var(--line-2) 50%, var(--surface-2) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .skel-card { background: var(--surface); border: 1px solid var(--line-2); border-radius: var(--r); padding: 14px; }
  .skel-line { height: 12px; }

  .error-card {
    background: var(--danger-soft); border: 1px solid color-mix(in oklab, var(--danger) 30%, transparent);
    border-radius: var(--r); padding: 14px 16px; color: var(--danger);
    display: flex; gap: 12px; align-items: flex-start;

  .error-card svg { flex-shrink: 0; margin-top: 2px; }
  .error-card .msg { font-size: 13px; font-weight: 500; line-height: 1.5; }
  .error-card button { background: transparent; border: 1px solid currentColor; border-radius: 100px; padding: 5px 12px; font-size: 12px; font-weight: 600; margin-top: 8px; cursor: pointer; color: inherit; }

  /* ── Modal / sheet ──────────────────────── */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50;
    opacity: 0; pointer-events: none; transition: opacity .25s;
    backdrop-filter: blur(4px);

  .sheet-overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 51;
    background: var(--surface);
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    padding: 8px 20px calc(var(--safe-bottom) + 24px);

    box-shadow: var(--shadow-lg);
  }
  .sheet.open { transform: none; }
  .sheet-handle { width: 40px; height: 5px; background: var(--line); border-radius: 100px; margin: 4px auto 20px; }
  .sheet-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
  .sheet-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 20px; }
  .detail-row { padding: 14px 0; border-top: 1px solid var(--line-2); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .detail-row .k { font-size: 12px; color: var(--ink-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .detail-row .v { font-size: 14px; font-weight: 500; text-align: right; color: var(--ink); }
  .detail-row .v.num { font-weight: 700; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
  .action-btn {
    padding: 13px; border-radius: var(--r); border: 1px solid var(--line);
    background: var(--surface); color: var(--ink); font-weight: 600; font-size: 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
    transition: transform .12s, background .15s;
  }
  .action-btn:active { transform: scale(.97); background: var(--surface-2); }
  .action-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* ── Setup screen ───────────────────────── */
  .setup-screen {
    min-height: 100vh; padding: calc(var(--safe-top) + 40px) 24px calc(var(--safe-bottom) + 24px);
    display: flex; flex-direction: column; justify-content: center;
    max-width: 440px; margin: 0 auto;
  }
  .setup-logo {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, var(--brand-2), var(--brand));
    display: grid; place-items: center; color: white;
    box-shadow: 0 8px 24px rgba(22,101,52,.3);
    margin: 0 auto 24px;
  }
  .setup-title { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; text-align: center; margin-bottom: 8px; }
  .setup-desc { font-size: 14px; color: var(--ink-2); text-align: center; margin-bottom: 32px; line-height: 1.5; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input {
    width: 100%; padding: 13px 14px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); font-size: 15px;
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 15%, transparent); }
  .btn-primary {
    width: 100%; padding: 14px; margin-top: 8px;
    background: var(--ink); color: var(--bg); border: none;
    border-radius: var(--r); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: transform .12s, opacity .15s;
  }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .4; }
  .hint { font-size: 12px; color: var(--ink-3); text-align: center; margin-top: 16px; line-height: 1.5; }

  /* ── Toast ──────────────────────────────── */
  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 24px); left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--bg); padding: 10px 18px;
    border-radius: 100px; font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 640px) {
    .kpi-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>

<body>

<!-- ─── Setup ─── -->
<div id="setup" class="setup-screen" hidden>
  <div class="setup-logo">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M4 7h16l-2 12H6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M8 7V5a4 4 0 0 1 8 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </div>
  <h1 class="setup-title">Nutsa Livraisons</h1>
  <p class="setup-desc">Configurez l'accès à votre tableau de bord pour commencer.</p>
  <form onsubmit="event.preventDefault(); saveConfig();">
    <div class="field">
      <label for="cfg-url">URL Apps Script</label>
      <input id="cfg-url" type="url" inputmode="url" autocomplete="url"
             placeholder="https://script.google.com/macros/s/.../exec" required>
    </div>
    <button type="submit" class="btn-primary" id="saveBtn">Continuer</button>
  </form>
  <p class="hint">L'URL est fournie par le déploiement Web App de votre Apps Script.</p>
</div>

<!-- ─── App ─── -->
<div id="app" hidden>
  <header>
    <div class="header-row">
      <div class="brand-mark">
        <div class="brand-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 7h16l-2 12H6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M8 7V5a4 4 0 0 1 8 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="brand-name">Nutsa</div>
          <div class="brand-sub">Livraisons</div>
        </div>
      </div>
      <button class="icon-btn" id="refreshBtn" aria-label="Actualiser">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
    <div class="updated"><span class="dot"></span><span id="lastUpdated">Connexion…</span></div>
  </header>

  <main id="content" class="stack"></main>
</div>

<!-- ─── Detail sheet ─── -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<!-- ─── Toast ─── -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════
//  STORE — persistence + cache
// ══════════════════════════════════════════════════════════
const store = {
  CFG_KEY: 'nutsa.cfg.v2',
  CACHE_KEY: 'nutsa.cache.v2',
  getCfg() {
    try { return JSON.parse(localStorage.getItem(this.CFG_KEY)) || null; }
    catch { return null; }
  },
  setCfg(cfg) { localStorage.setItem(this.CFG_KEY, JSON.stringify(cfg)); },
  clearCfg() { localStorage.removeItem(this.CFG_KEY); },
  getCache() {
    try {
      const raw = localStorage.getItem(this.CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (Date.now() - parsed.t > 24 * 3600 * 1000) return null; // 24h
      return parsed;
    } catch { return null; }
  },
  setCache(data) {
    try { localStorage.setItem(this.CACHE_KEY, JSON.stringify({ t: Date.now(), data })); }
    catch {}
  }
};

// ══════════════════════════════════════════════════════════
//  API — fetch with retry, race protection
// ══════════════════════════════════════════════════════════
let inflight = null;
async function apiFetch() {
  const cfg = store.getCfg();
  if (!cfg?.url) throw new Error('Configuration manquante');
  if (inflight) return inflight;

  const url = `${cfg.url}?action=dashboard&_=${Date.now()}`;
  const attempt = async (n) => {
    try {
      const res = await fetch(url, { cache: 'no-store', redirect: 'follow' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      return json;
    } catch (err) {
      if (n < 2) {
        await new Promise(r => setTimeout(r, 800 * (n + 1)));
        return attempt(n + 1);
      }
      throw err;
    }
  };
  inflight = attempt(0).finally(() => { inflight = null; });
  return inflight;
}

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
const state = {
  data: null,
  filter: 'all',
  search: '',
  loading: false,
  error: null,
  lastFetch: null
};

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
const $ = (id) => document.getElementById(id);
const fmtNum = (n) => Number(n || 0).toLocaleString('fr-FR');
const fmtCompact = (n) => {
  n = Number(n || 0);
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
  return fmtNum(n);
};

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 1) return "à l'instant";
  if (diffMin < 60) return `il y a ${diffMin} min`;
  const isToday = d.toDateString() === now.toDateString();
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  const isYest = d.toDateString() === yest.toDateString();
  if (isToday) return `Aujourd'hui à ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  if (isYest) return `Hier à ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  const diffDays = Math.floor((now - d) / (86400000));
  if (diffDays < 7) return `il y a ${diffDays} j`;
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function classifyDelivery(raw) {
  const s = String(raw || '').toLowerCase();
  if (!s) return { key: 'none', label: '—' };
  if (/livr[ée]|delivered/.test(s)) return { key: 'livre', label: raw, icon: 'check' };
  if (/retour|returned|retourn[ée]/.test(s)) return { key: 'retour', label: raw, icon: 'back' };
  if (/annul|cancel/.test(s)) return { key: 'annule', label: raw };
  if (/echec|échec|failed|tentative|absent|injoignable/.test(s)) return { key: 'echec', label: raw, icon: 'alert' };
  if (/transit|route|cours|shipped|exped|expéd/.test(s)) return { key: 'transit', label: raw, icon: 'truck' };
  if (/centre|hub|depot|dépôt|wilaya/.test(s)) return { key: 'hub', label: raw };
  if (/prep|préparation|preparation|pending|attente/.test(s)) return { key: 'prep', label: raw };
  return { key: 'none', label: raw };
}

function classifyStatus(status) {
  const s = String(status || '').trim();
  const map = {
    'Livré': 'livre',
    'Confirmed': 'confirmed',
    'Cancelled': 'annule',
    'Pending': 'pending',
    'No Answer': 'noanswer',
    'Callback': 'callback'
  };
  return { key: map[s] || 'none', label: s || '—' };
}

const badgeIcons = {
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  truck: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="2"/><circle cx="18.5" cy="18.5" r="2"/></svg>',
  alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 20h20z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r=".5"/></svg>',
  back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L5 10l4-4M5 10h14"/></svg>'
};

function renderBadge(cls) {
  const icon = cls.icon ? badgeIcons[cls.icon] : '';
  return `<span class="badge b-${cls.key}">${icon}${escapeHtml(cls.label)}</span>`;
}

// ══════════════════════════════════════════════════════════
//  FILTERING
// ══════════════════════════════════════════════════════════
function filterMatch(o) {
  if (state.filter === 'all') return true;
  const st = String(o.status || '').trim();
  const ds = String(o.delivery_state || '').toLowerCase();
  switch (state.filter) {
    case 'transit': return /transit|route|cours|shipped|exped|centre|hub|depot|wilaya/i.test(ds);
    case 'livre': return st === 'Livré' || /livr[ée]|delivered/.test(ds);
    case 'probleme': return /retour|echec|échec|failed|tentative|absent|injoignable|annul/i.test(ds) || st === 'Cancelled';
    case 'attente': return st === 'Pending' || (st === 'Confirmed' && !ds);
  }
  return true;
}

function searchMatch(o) {
  if (!state.search) return true;
  const q = state.search.toLowerCase();
  return String(o.order || '').toLowerCase().includes(q)
    || String(o.name || '').toLowerCase().includes(q)
    || String(o.phone || '').toLowerCase().includes(q)
    || String(o.commune || '').toLowerCase().includes(q);
}

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function render() {
  const c = $('content');

  if (state.error && !state.data) {
    c.innerHTML = `
      <div class="error-card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5"/></svg>
        <div>
          <div class="msg"><strong>Impossible de charger.</strong><br>${escapeHtml(state.error)}</div>
          <button onclick="refresh()">Réessayer</button>
          <button onclick="resetApp()" style="margin-left:6px">Reconfigurer</button>
        </div>
      </div>`;
    return;
  }

  if (state.loading && !state.data) {
    c.innerHTML = `
      <div class="kpi-grid">
        ${Array(4).fill(0).map(() => `
          <div class="skel-card">
            <div class="skeleton skel-line" style="width:50%"></div>
            <div class="skeleton skel-line" style="width:70%;height:24px;margin-top:10px"></div>
          </div>`).join('')}
      </div>
      <div class="skel-card" style="margin-top:12px"><div class="skeleton skel-line" style="width:100%;height:20px"></div></div>
      ${Array(4).fill(0).map(() => `
        <div class="skel-card" style="margin-top:8px">
          <div class="skeleton skel-line" style="width:40%"></div>
          <div class="skeleton skel-line" style="width:70%;margin-top:8px"></div>
        </div>`).join('')}`;
    return;
  }

  if (!state.data) return;

  const orders = state.data.sheet?.recent_orders || [];
  const sum = state.data.sheet?.summary || {};

  const isToday = (iso) => {
    if (!iso) return false;
    const d = new Date(iso);
    return !isNaN(d) && d.toDateString() === new Date().toDateString();
  };
  const todayCount = orders.filter(o => isToday(o.date)).length;
  const inTransit = orders.filter(o => classifyDelivery(o.delivery_state).key === 'transit' || classifyDelivery(o.delivery_state).key === 'hub').length;
  const livre = orders.filter(o => String(o.status).trim() === 'Livré' || classifyDelivery(o.delivery_state).key === 'livre').length;
  const probleme = orders.filter(o => ['echec','retour','annule'].includes(classifyDelivery(o.delivery_state).key)).length;

  const filtered = orders.filter(o => filterMatch(o) && searchMatch(o));

  c.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi accent-brand">
        <div class="kpi-head">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Aujourd'hui
        </div>
        <div class="kpi-value num">${todayCount}</div>
        <div class="kpi-sub">commandes reçues</div>
      </div>
      <div class="kpi">
        <div class="kpi-head">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Revenu 30j
        </div>
        <div class="kpi-value num">${fmtCompact(sum.confirmed_revenue)}</div>
        <div class="kpi-sub">DA confirmés</div>
      </div>
      <div class="kpi accent-info">
        <div class="kpi-head">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="2"/><circle cx="18.5" cy="18.5" r="2"/></svg>
          En transit
        </div>
        <div class="kpi-value num">${inTransit}</div>
        <div class="kpi-sub">colis en route</div>
      </div>
      <div class="kpi accent-${probleme > 0 ? 'danger' : 'brand'}">
        <div class="kpi-head">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r=".5"/></svg>
          À traiter
        </div>
        <div class="kpi-value num">${probleme}</div>
        <div class="kpi-sub">problèmes livraison</div>
      </div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="search" placeholder="Rechercher commande, nom, téléphone…"
             value="${escapeHtml(state.search)}" autocomplete="off" enterkeyhint="search">
      <button class="clear-btn ${state.search ? 'show' : ''}" onclick="clearSearch()" aria-label="Effacer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="chips">
      ${chipHTML('all', 'Toutes', orders.length)}
      ${chipHTML('transit', 'En transit', inTransit)}
      ${chipHTML('livre', 'Livrées', livre)}
      ${chipHTML('probleme', 'Problèmes', probleme)}
      ${chipHTML('attente', 'En attente', orders.filter(o => filterMatchOf(o, 'attente')).length)}
    </div>

    <div class="section">
      <h2>Commandes récentes</h2>
      <span class="count-tag num">${filtered.length}</span>
    </div>

    <div class="order-list">
      ${filtered.length === 0
        ? emptyState()
        : filtered.map((o, i) => orderCardHTML(o, i)).join('')}
    </div>
  `;

  // Wire up search input
  const si = $('searchInput');
  if (si) {
    let t;
    si.addEventListener('input', (e) => {
      clearTimeout(t);
      const val = e.target.value;
      t = setTimeout(() => {
        state.search = val.trim();
        render();
        requestAnimationFrame(() => {
          const el = $('searchInput');
          if (el) { el.focus(); el.setSelectionRange(val.length, val.length); }
        });
      }, 150);
    });
  }
}

function filterMatchOf(o, f) {
  const saved = state.filter; state.filter = f;
  const ok = filterMatch(o); state.filter = saved;
  return ok;
}

function chipHTML(id, label, count) {
  return `<button class="chip ${state.filter === id ? 'active' : ''}" onclick="setFilter('${id}')">
    ${escapeHtml(label)} <span class="count num">${count}</span>
  </button>`;
}

function orderCardHTML(o, idx) {
  const dCls = classifyDelivery(o.delivery_state);
  const sCls = classifyStatus(o.status);
  return `
    <div class="order" style="animation-delay:${Math.min(idx * 20, 300)}ms" onclick='openSheet(${idx})'>
      <div class="order-line-1">
        <div class="order-ref">${escapeHtml(o.order || '—')}</div>
        <div class="order-total num">${fmtNum(o.total)}<span class="cur">DA</span></div>
      </div>
      <div class="order-line-2">${escapeHtml(o.name || 'Sans nom')}</div>
      <div class="order-line-3">
        <span>📍 ${escapeHtml(o.commune || '—')}${o.wilaya ? ', ' + escapeHtml(o.wilaya) : ''}</span>
        ${o.date ? `<span class="dot-sep">·</span><span>${escapeHtml(timeAgo(o.date))}</span>` : ''}
      </div>
      <div class="order-line-4">
        ${renderBadge(sCls)}
        ${o.delivery_state ? renderBadge(dCls) : ''}
      </div>
    </div>`;
}

function emptyState() {
  return `<div class="empty">
    <div class="emoji">📭</div>
    <h3>Aucune commande</h3>
    <p>${state.search || state.filter !== 'all' ? 'Essayez de modifier vos filtres.' : 'Rien à afficher pour le moment.'}</p>
  </div>`;
}

// ══════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════
function setFilter(f) { state.filter = f; render(); }
function clearSearch() { state.search = ''; render(); }

async function refresh() {
  const btn = $('refreshBtn');
  btn?.classList.add('spin');
  state.loading = true;
  if (!state.data) render();
  try {
    const data = await apiFetch();
    state.data = data;
    state.error = null;
    state.lastFetch = new Date();
    store.setCache(data);
    updateLastFetched();
    render();
  } catch (err) {
    state.error = err.message || 'Erreur réseau';
    if (!state.data) render();
    else toast('Échec de mise à jour');
  } finally {
    state.loading = false;
    setTimeout(() => btn?.classList.remove('spin'), 900);
  }
}

function updateLastFetched() {
  const el = $('lastUpdated');
  if (!el) return;
  if (!state.lastFetch) { el.textContent = 'Connexion…'; return; }
  const t = state.lastFetch;
  el.textContent = `Mis à jour à ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════════════════
//  DETAIL SHEET
// ══════════════════════════════════════════════════════════
function openSheet(idx) {
  const orders = state.data?.sheet?.recent_orders || [];
  const visible = orders.filter(o => filterMatch(o) && searchMatch(o));
  const o = visible[idx];
  if (!o) return;

  const dCls = classifyDelivery(o.delivery_state);
  const sCls = classifyStatus(o.status);

  $('sheet').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${escapeHtml(o.order || '—')}</div>
    <div class="sheet-sub">${escapeHtml(o.date ? timeAgo(o.date) : '')}</div>

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      ${renderBadge(sCls)}
      ${o.delivery_state ? renderBadge(dCls) : ''}
    </div>

    <div class="detail-row"><span class="k">Client</span><span class="v">${escapeHtml(o.name || '—')}</span></div>
    <div class="detail-row"><span class="k">Téléphone</span><span class="v">${escapeHtml(o.phone || '—')}</span></div>
    <div class="detail-row"><span class="k">Wilaya</span><span class="v">${escapeHtml(o.wilaya || '—')}</span></div>
    <div class="detail-row"><span class="k">Commune</span><span class="v">${escapeHtml(o.commune || '—')}</span></div>
    <div class="detail-row"><span class="k">Produits</span><span class="v" style="max-width:60%">${escapeHtml(o.product || '—')}</span></div>
    <div class="detail-row"><span class="k">Quantité</span><span class="v num">${fmtNum(o.qty)}</span></div>
    <div class="detail-row"><span class="k">Total</span><span class="v num">${fmtNum(o.total)} DA</span></div>
    ${o.tracking ? `<div class="detail-row"><span class="k">Suivi</span><span class="v">${escapeHtml(o.tracking)}</span></div>` : ''}
    ${o.delivery_state ? `<div class="detail-row"><span class="k">État Anderson</span><span class="v">${escapeHtml(o.delivery_state)}</span></div>` : ''}
    <div class="detail-row"><span class="k">Source</span><span class="v" style="text-transform:capitalize">${escapeHtml(o.source || '—')}</span></div>

    <div class="actions">
      ${o.phone ? `<a class="action-btn primary" href="tel:${encodeURIComponent(o.phone)}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Appeler
      </a>` : '<span></span>'}
      ${o.tracking ? `<button class="action-btn" onclick="copyText('${escapeHtml(o.tracking)}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copier suivi
      </button>` : '<span></span>'}
    </div>
  `;
  $('sheet').classList.add('open');
  $('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  $('sheet').classList.remove('open');
  $('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast('Copié ✓');
  } catch { toast('Impossible de copier'); }
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 1800);
}

// ══════════════════════════════════════════════════════════
//  SETUP
// ══════════════════════════════════════════════════════════
function saveConfig() {
  const url = $('cfg-url').value.trim();
  if (!url) return;
  if (!/^https?:\/\//.test(url)) { toast('URL invalide'); return; }
  store.setCfg({ url });
  mount();
}

function resetApp() {
  store.clearCfg();
  location.reload();
}

// ══════════════════════════════════════════════════════════
//  MOUNT
// ══════════════════════════════════════════════════════════
function mount() {
  const cfg = store.getCfg();
  if (!cfg?.url) {
    $('setup').hidden = false;
    $('app').hidden = true;
    return;
  }
  $('setup').hidden = true;
  $('app').hidden = false;

  // Warm from cache immediately
  const cached = store.getCache();
  if (cached) {
    state.data = cached.data;
    state.lastFetch = new Date(cached.t);
    updateLastFetched();
    render();
  } else {
    state.loading = true;
    render();
  }

  refresh();

  $('refreshBtn').addEventListener('click', refresh);

  // Auto-refresh every 60s (only when tab visible)
  setInterval(() => { if (!document.hidden) refresh(); }, 60_000);

  // Refresh on tab focus
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.lastFetch && Date.now() - state.lastFetch > 30_000) refresh();
  });

  // Close sheet on Escape
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSheet(); });

  // Pull-to-refresh (basic)
  let startY = 0, pulling = false;
  document.addEventListener('touchstart', (e) => {
    if (window.scrollY === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    if (pulling && e.changedTouches[0].clientY - startY > 80) refresh();
    pulling = false;
  }, { passive: true });
}

mount();
</script>
