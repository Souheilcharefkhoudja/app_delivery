<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0F0C" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F5F5F0" media="(prefers-color-scheme: light)">
<title>Nutsa · Carte</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root {
    --bg: #F5F5F0;
    --surface: rgba(255,255,255,.85);
    --surface-solid: #FFFFFF;
    --surface-2: #F4F4EF;
    --surface-3: #ECECE5;
    --ink: #0F1F14;
    --ink-2: #4B5563;
    --ink-3: #94A3B8;
    --line: #E5E7EB;
    --line-2: #F1F1EC;
    --brand: #166534;
    --brand-2: #22C55E;
    --brand-soft: #ECFDF3;
    --danger: #DC2626;
    --danger-soft: #FEF2F2;
    --warn: #D97706;
    --warn-soft: #FFFBEB;
    --info: #0284C7;
    --info-soft: #F0F9FF;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
    --shadow: 0 4px 12px rgba(15,23,42,.08), 0 20px 40px rgba(15,23,42,.08);
    --shadow-lg: 0 20px 60px rgba(15,23,42,.24);
    --r: 14px;
    --r-lg: 20px;
    --r-xl: 28px;
    --st: env(safe-area-inset-top);
    --sb: env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0A0F0C;
      --surface: rgba(19,26,22,.88);
      --surface-solid: #131A16;
      --surface-2: #1A211D;
      --surface-3: #232B27;
      --ink: #F5F5F0;
      --ink-2: #B8BEC1;
      --ink-3: #6B7280;
      --line: #232B27;
      --line-2: #1C2320;
      --brand: #22C55E;
      --brand-2: #4ADE80;
      --brand-soft: #0F1F15;
      --danger: #F87171;
      --danger-soft: #1F0E0E;
      --warn: #FBBF24;
      --warn-soft: #1F1710;
      --info: #38BDF8;
      --info-soft: #0A1922;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
      --shadow: 0 4px 12px rgba(0,0,0,.4), 0 20px 40px rgba(0,0,0,.2);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.7);
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 15px; line-height: 1.45; letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100%; height: 100dvh;
    touch-action: manipulation;
  }
  button, input { font: inherit; color: inherit; border: none; background: none; }
  a { color: inherit; text-decoration: none; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  /* ═══ MAP CANVAS ═══ */
  #map {
    position: fixed; inset: 0; z-index: 0;
    background: var(--bg);
  }
  #map .leaflet-tile-pane { filter: saturate(.95); }
  @media (prefers-color-scheme: dark) {
    #map .leaflet-tile-pane { filter: brightness(.75) saturate(.6); }
  }
  #map .leaflet-control-attribution {
    background: color-mix(in oklab, var(--surface-solid) 85%, transparent);
    color: var(--ink-3); font-size: 9.5px; padding: 2px 6px;
    border-radius: 6px; margin: 4px !important; border: none;
    backdrop-filter: blur(10px);
  }
  #map .leaflet-control-zoom {
    border: 1px solid var(--line-2);
    box-shadow: var(--shadow-sm);
    border-radius: 10px; overflow: hidden;
    background: var(--surface-solid);
  }
  #map .leaflet-control-zoom a {
    background: var(--surface-solid); color: var(--ink);
    border-color: var(--line-2); font-weight: 700; font-size: 16px;
    width: 32px; height: 32px; line-height: 32px;
  }
  #map .leaflet-control-zoom a:hover { background: var(--surface-2); }
  #map .leaflet-popup-content-wrapper {
    background: var(--surface-solid); color: var(--ink);
    border-radius: 14px; box-shadow: var(--shadow);
    padding: 4px;
  }
  #map .leaflet-popup-tip { background: var(--surface-solid); }
  #map .leaflet-popup-content { margin: 10px 12px; font: inherit; }

  /* ═══ HEADER ═══ */
  .top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    padding: calc(var(--st) + 10px) 12px 10px;
    pointer-events: none;
  }
  .top-inner {
    display: flex; align-items: center; gap: 8px;
    max-width: 720px; margin: 0 auto;
  }
  .glass {
    background: var(--surface);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid color-mix(in oklab, var(--line) 60%, transparent);
    box-shadow: var(--shadow-sm);
    pointer-events: auto;
  }
  .back-btn {
    width: 40px; height: 40px; border-radius: 12px;
    display: grid; place-items: center; color: var(--ink);
    transition: transform .12s;
  }
  .back-btn:active { transform: scale(.9); }

  .title-pill {
    flex: 1; min-width: 0;
    padding: 8px 14px; border-radius: 14px;
    display: flex; align-items: center; gap: 10px;
    color: var(--ink);
  }
  .title-pill .icon {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--brand-2), var(--brand));
    display: grid; place-items: center; color: white;
    box-shadow: 0 2px 4px color-mix(in oklab, var(--brand) 40%, transparent);
    flex-shrink: 0;
  }
  .title-pill .meta { min-width: 0; }
  .title-pill .t { font-weight: 700; font-size: 14px; letter-spacing: -0.02em; line-height: 1.15; }
  .title-pill .s {
    font-size: 10.5px; color: var(--ink-3); font-weight: 500;
    display: flex; align-items: center; gap: 5px; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .title-pill .live-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--brand-2);
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--brand-2) 25%, transparent);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 50% { opacity: .4; } }

  .refresh-btn {
    width: 40px; height: 40px; border-radius: 12px;
    display: grid; place-items: center; color: var(--ink);
    transition: transform .12s;
  }
  .refresh-btn:active { transform: scale(.9); }
  .refresh-btn.spin svg { animation: spin 800ms cubic-bezier(.4,0,.2,1); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══ BOTTOM DOCK ═══ */
  .dock {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
    padding: 8px 12px calc(var(--sb) + 12px);
    pointer-events: none;
  }
  .dock-inner {
    max-width: 720px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 8px;
  }
  .stats-card {
    padding: 12px 14px; border-radius: var(--r-lg);
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    pointer-events: auto;
  }
  .stat {
    text-align: center; cursor: pointer;
    padding: 4px 2px; border-radius: 10px;
    transition: background .15s, transform .12s;
  }
  .stat:active { transform: scale(.94); }
  .stat.active { background: var(--surface-3); }
  .stat .k { font-size: 9.5px; color: var(--ink-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; line-height: 1.15; }
  .stat .v { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .stat .indicator {
    width: 5px; height: 5px; border-radius: 50%; margin: 3px auto 0;
    background: var(--ink-3);
  }
  .stat.all.active .indicator { background: var(--ink); }
  .stat.livre .indicator, .stat.livre .v { color: var(--brand); }
  .stat.livre .indicator { background: var(--brand); }
  .stat.transit .indicator, .stat.transit .v { color: var(--info); }
  .stat.transit .indicator { background: var(--info); }
  .stat.problem .indicator, .stat.problem .v { color: var(--danger); }
  .stat.problem .indicator { background: var(--danger); }
  .stat.pending .indicator, .stat.pending .v { color: var(--warn); }
  .stat.pending .indicator { background: var(--warn); }
  .stat.all .v { color: var(--ink); }

  /* ═══ CUSTOM MARKERS (DivIcon) ═══ */
  .marker {
    display: grid; place-items: center;
    border-radius: 50%; color: white;
    font-weight: 800; letter-spacing: -0.02em;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-variant-numeric: tabular-nums;
    box-shadow: 0 2px 8px rgba(15,23,42,.25), 0 0 0 3px color-mix(in oklab, currentColor 20%, transparent);
    transition: transform .18s cubic-bezier(.2,1,.4,1);
    cursor: pointer;
    text-shadow: 0 1px 2px rgba(0,0,0,.35);
    position: relative;
    animation: markerIn .4s cubic-bezier(.2,1.2,.3,1) backwards;
  }
  @keyframes markerIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .marker::before {
    content: ''; position: absolute; inset: -4px;
    border-radius: 50%; border: 2px solid currentColor; opacity: 0;
    transition: opacity .2s, transform .2s;
  }
  .marker:hover::before { opacity: .5; transform: scale(1.05); }
  .marker.livre { background: linear-gradient(135deg, #22C55E, #166534); color: #166534; }
  .marker.transit { background: linear-gradient(135deg, #38BDF8, #0284C7); color: #0284C7; }
  .marker.problem { background: linear-gradient(135deg, #F87171, #DC2626); color: #DC2626; }
  .marker.pending { background: linear-gradient(135deg, #FBBF24, #D97706); color: #D97706; }

  /* ═══ POPUP ═══ */
  .popup-body { min-width: 200px; }
  .popup-title { font-size: 15px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
  .popup-count { font-size: 11px; color: var(--ink-3); font-weight: 600; margin-bottom: 10px; }
  .popup-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 10px; margin-bottom: 12px; }
  .popup-stat { display: flex; align-items: center; gap: 6px; font-size: 12.5px; }
  .popup-stat .d { width: 6px; height: 6px; border-radius: 50%; }
  .popup-stat .d.livre { background: var(--brand); }
  .popup-stat .d.transit { background: var(--info); }
  .popup-stat .d.problem { background: var(--danger); }
  .popup-stat .d.pending { background: var(--warn); }
  .popup-stat .lbl { color: var(--ink-2); flex: 1; }
  .popup-stat .n { font-weight: 700; }
  .popup-cta {
    display: block; width: 100%; padding: 8px 12px; border-radius: 10px;
    background: var(--ink); color: var(--surface-solid);
    font-size: 12.5px; font-weight: 700; text-align: center;
    letter-spacing: -0.005em; cursor: pointer;
  }
  .popup-cta:active { transform: scale(.98); }

  /* ═══ DETAIL SHEET ═══ */
  .overlay {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.5);
    backdrop-filter: blur(4px); opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 51;
    background: var(--surface-solid); color: var(--ink);
    border-radius: 26px 26px 0 0; max-height: 88vh; overflow-y: auto;
    padding: 6px 20px calc(var(--sb) + 24px);
    transform: translateY(101%);
    transition: transform .38s cubic-bezier(.2,.8,.2,1);
    box-shadow: var(--shadow-lg);
  }
  .sheet.open { transform: none; }
  .sheet-grab { width: 36px; height: 4px; background: var(--line); border-radius: 100px; margin: 6px auto 18px; }
  .sheet-title { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  .sheet-sub { font-size: 13px; color: var(--ink-2); margin-top: 4px; font-weight: 500; }
  .sheet-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding: 16px 0 20px;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 6px;
  }
  .sheet-stats .cell {
    background: var(--surface-2); border-radius: 12px; padding: 10px 8px;
    text-align: center;
  }
  .sheet-stats .cell .k { font-size: 10px; color: var(--ink-3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
  .sheet-stats .cell .v { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .sheet-stats .cell.livre .v { color: var(--brand); }
  .sheet-stats .cell.transit .v { color: var(--info); }
  .sheet-stats .cell.problem .v { color: var(--danger); }
  .sheet-stats .cell.pending .v { color: var(--warn); }

  .orders-title {
    font-size: 11px; font-weight: 700; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 18px 0 10px;
  }
  .order-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; background: var(--surface-2);
    border-radius: 12px; margin-bottom: 6px;
    transition: transform .12s;
  }
  .order-item:active { transform: scale(.99); }
  .order-item .status-pill {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    box-shadow: 0 0 0 3px color-mix(in oklab, currentColor 20%, transparent);
  }
  .order-item .status-pill.livre { background: var(--brand); color: var(--brand); }
  .order-item .status-pill.transit { background: var(--info); color: var(--info); }
  .order-item .status-pill.problem { background: var(--danger); color: var(--danger); }
  .order-item .status-pill.pending { background: var(--warn); color: var(--warn); }
  .order-item .info { flex: 1; min-width: 0; }
  .order-item .ref { font-weight: 700; font-size: 13.5px; letter-spacing: -0.01em; }
  .order-item .name { font-size: 12px; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
  .order-item .state { font-size: 11px; color: var(--ink-3); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .order-item .amt { font-weight: 700; font-size: 13px; white-space: nowrap; }

  .empty {
    text-align: center; padding: 40px 20px; color: var(--ink-3);
    font-size: 13px;
  }

  /* ═══ TOAST / ERROR ═══ */
  .toast {
    position: fixed; top: calc(var(--st) + 68px); left: 50%;
    transform: translateX(-50%) translateY(-16px);
    background: var(--surface-solid); color: var(--ink);
    padding: 10px 16px; border-radius: 100px;
    font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow);
    opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 60;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: white; }

  .loading-hint {
    position: fixed; top: calc(var(--st) + 76px); left: 50%;
    transform: translateX(-50%);
    padding: 8px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 600; color: var(--ink-2);
    display: flex; align-items: center; gap: 8px;
    z-index: 20;
  }
  .loading-hint .sp {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--line); border-top-color: var(--brand);
    border-radius: 50%; animation: spin 800ms linear infinite;
  }
</style>
</head>

  51:{name:'Ouled Djellal',lat:34.42,lng:5.06}, 52:{name:'Béni Abbès',lat:30.13,lng:-2.16},
  53:{name:'In Salah',lat:27.20,lng:2.48}, 54:{name:'In Guezzam',lat:19.55,lng:5.77},
  55:{name:'Touggourt',lat:33.11,lng:6.06}, 56:{name:'Djanet',lat:24.55,lng:9.48},
  57:{name:"El M'Ghair",lat:33.95,lng:5.92}, 58:{name:'El Meniaa',lat:30.58,lng:2.87}
};
const NAME_TO_ID = (function() {
  const m = {};
  for (const [id, w] of Object.entries(WILAYAS)) {
    m[w.name.toLowerCase()] = Number(id);
    m[w.name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')] = Number(id);
  }
  Object.assign(m, {
    'alger centre':16,'algiers':16,'bejaia':6,'bejaïa':6,'setif':19,'tebessa':12,
    'medea':26,'naama':45,'saida':20,'ghardaia':47,'ain temouchent':46,'ain defla':44,
    'bordj bou arreridj':34,'boumerdes':35,'ouled jellal':51,'msila':28,"m'sila":28,
    'beni abbes':52,'el mghair':57,"el m'ghair":57
  });
  return m;
})();
function orderWilayaId(o) {
  const raw = String(o.wilaya || '').trim();
  if (!raw) return null;
  const n = parseInt(raw, 10);
  if (!isNaN(n) && WILAYAS[n]) return n;
  const key = raw.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/^\d+\s*[—\-]\s*/, '').trim();
  if (NAME_TO_ID[key]) return NAME_TO_ID[key];
  for (const [k, id] of Object.entries(NAME_TO_ID)) {
    if (key.includes(k) || k.includes(key)) return id;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
//  STORE / STATE / API
// ═══════════════════════════════════════════════════════════════
const store = {
  getCfg() { try { return JSON.parse(localStorage.getItem(CFG_KEY)); } catch { return null; } },
  getCache() { try { const r = localStorage.getItem(CACHE_KEY); if (!r) return null; const p = JSON.parse(r); return Date.now() - p.t > 24*3600*1000 ? null : p; } catch { return null; } },
  setCache(d) { try { localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), data: d })); } catch {} }
};
const state = { data: null, view: 'all', markers: [], map: null, lastFetch: null };

async function fetchFeed(liveCount) {
  const cfg = store.getCfg();
  const tokenParam = cfg.token ? `&token=${encodeURIComponent(cfg.token)}` : '';
  const live = liveCount ? `&live=${liveCount}` : '';
  const url = `${cfg.url}?action=feed${tokenParam}${live}&_=${Date.now()}`;
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// ═══════════════════════════════════════════════════════════════
//  CLASSIFICATION
// ═══════════════════════════════════════════════════════════════
// Anderson uses English-ish canonical codes in col N (confirmed via sheet audit).
const ANDERSON_STATE = {
  'livred': 'livre',
  'payed':  'livre',
  'delivered': 'livre',
  'returned': 'problem',
  'attempt_delivery': 'problem',
  'order_information_received_by_carrier': 'transit',
  'accepted_by_carrier': 'transit',
  'ready_to_ship': 'transit',
  'in_transit': 'transit'
};
// Fallback fuzzy patterns (in case Anderson sends French text on some rows)
const RE_LIVRE = /\blivr[ée]\b|livraison\s+r[eé]ussie|\bpaid\b|\bpay[eé]\b/i;
const RE_PROBLEM = /return|retour|refus|annul|cancel|absent|injoignable|\bechec\b|\béchec\b|suspend|failed|tentative|non\s*s[eé]rieux/i;
const RE_TRANSIT = /transit|route|cours|shipped|carrier|ramass|collect|centre|hub|station|wilaya|prep|préparation|preparation|exped|expéd|en\s+livraison|received_by/i;

function classify(o) {
  const st = String(o.status || '').trim();
  const ds = String(o.delivery_state || '').toLowerCase().trim();
  if (st === 'Cancelled') return 'problem';
  if (ds) {
    if (ANDERSON_STATE[ds]) return ANDERSON_STATE[ds];      // exact canonical hit
    if (RE_LIVRE.test(ds)) return 'livre';
    if (RE_PROBLEM.test(ds)) return 'problem';
    if (RE_TRANSIT.test(ds)) return 'transit';
    return 'problem';   // unknown non-empty state → worth investigating
  }
  // No col N text: fall back to col M
  if (st === 'Livré') return 'livre';
  return 'pending';
}
function aggregate(orders) {
  const buckets = {};
  for (const o of orders) {
    const id = orderWilayaId(o);
    if (!id) continue;
    if (!buckets[id]) {
      buckets[id] = {
        id, name: WILAYAS[id].name, lat: WILAYAS[id].lat, lng: WILAYAS[id].lng,
        total: 0, livre: 0, transit: 0, problem: 0, pending: 0, orders: []
      };
    }
    const b = buckets[id];
    const c = classify(o);
    b.total++; b[c]++; b.orders.push({ ...o, _class: c });
  }
  return Object.values(buckets);
}
function dominantClass(b) {
  if (state.view !== 'all') return state.view;
  const counts = { problem: b.problem, transit: b.transit, livre: b.livre, pending: b.pending };
  return Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
}
function bucketCount(b) { return state.view === 'all' ? b.total : b[state.view]; }
function markerSize(count, maxCount) {
  if (count <= 0) return 0;
  const min = 30, max = 62;
  const scale = Math.sqrt(count / Math.max(1, maxCount));
  return Math.round(min + (max - min) * scale);
}
function fmtCount(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ═══════════════════════════════════════════════════════════════
//  MAP INIT
// ═══════════════════════════════════════════════════════════════
function initMap() {
  const map = L.map('map', {
    zoomControl: true,
    attributionControl: true,
    minZoom: 4,
    maxZoom: 12,
    worldCopyJump: false,
    preferCanvas: false
  }).setView([28.5, 2.6], 5);

  // Detect dark mode
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const tileUrl = isDark
    ? 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png';
  const labelUrl = isDark
    ? 'https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png';

  L.tileLayer(tileUrl, {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> · <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd', maxZoom: 20, minZoom: 0
  }).addTo(map);
  L.tileLayer(labelUrl, {
    subdomains: 'abcd', maxZoom: 20, minZoom: 0, pane: 'shadowPane'
  }).addTo(map);

  // Fit to Algeria bounds
  map.fitBounds([[19, -9], [37.5, 12.5]], { padding: [40, 40] });

  state.map = map;
  return map;
}

// ═══════════════════════════════════════════════════════════════
//  RENDER MARKERS
// ═══════════════════════════════════════════════════════════════
function renderMarkers() {
  if (!state.map) return;
  const orders = state.data?.sheet?.recent_orders || [];
  const buckets = aggregate(orders);
  const totals = { livre: 0, transit: 0, problem: 0, pending: 0, all: 0 };
  buckets.forEach(b => { totals.livre += b.livre; totals.transit += b.transit; totals.problem += b.problem; totals.pending += b.pending; totals.all += b.total; });

  // Update stats bar
  renderStatsBar(totals);

  // Clear old markers
  state.markers.forEach(m => state.map.removeLayer(m));
  state.markers = [];

  const active = buckets.filter(b => bucketCount(b) > 0);
  const maxCount = Math.max(1, ...active.map(bucketCount));

  active.forEach((b, i) => {
    const cls = dominantClass(b);
    const count = bucketCount(b);
    const size = markerSize(count, maxCount);
    const fontSize = size >= 50 ? 15 : size >= 40 ? 14 : size >= 34 ? 13 : 12;

    const icon = L.divIcon({
      className: '',
      html: `<div class="marker ${cls}" style="width:${size}px;height:${size}px;font-size:${fontSize}px;animation-delay:${Math.min(i * 15, 400)}ms">${fmtCount(count)}</div>`,
      iconSize: [size, size],
      iconAnchor: [size / 2, size / 2]
    });

    const marker = L.marker([b.lat, b.lng], { icon, riseOnHover: true, riseOffset: 250 }).addTo(state.map);
    marker.bindPopup(popupHTML(b), { closeButton: false, maxWidth: 260, className: 'nutsa-popup' });
    marker.on('click', () => { marker.openPopup(); });
    state.markers.push(marker);
  });
}

function popupHTML(b) {
  return `
    <div class="popup-body">
      <div class="popup-title">${escapeHtml(b.name)}</div>
      <div class="popup-count">${b.total} commande${b.total > 1 ? 's' : ''}</div>
      <div class="popup-stats">
        ${b.livre ? `<div class="popup-stat"><span class="d livre"></span><span class="lbl">Livré</span><span class="n num">${b.livre}</span></div>` : ''}
        ${b.transit ? `<div class="popup-stat"><span class="d transit"></span><span class="lbl">Transit</span><span class="n num">${b.transit}</span></div>` : ''}
        ${b.problem ? `<div class="popup-stat"><span class="d problem"></span><span class="lbl">Problème</span><span class="n num">${b.problem}</span></div>` : ''}
        ${b.pending ? `<div class="popup-stat"><span class="d pending"></span><span class="lbl">Attente</span><span class="n num">${b.pending}</span></div>` : ''}
      </div>
      <button class="popup-cta" onclick="openWilaya(${b.id})">Voir les commandes →</button>
    </div>`;
}

function renderStatsBar(t) {
  document.getElementById('statsBar').innerHTML = `
    <div class="stat all ${state.view === 'all' ? 'active' : ''}" onclick="setView('all')">
      <div class="k">Total</div>
      <div class="v num">${fmtCount(t.all)}</div>
      <div class="indicator"></div>
    </div>
    <div class="stat livre ${state.view === 'livre' ? 'active' : ''}" onclick="setView('livre')">
      <div class="k">Livré</div>
      <div class="v num">${fmtCount(t.livre)}</div>
      <div class="indicator"></div>
    </div>
    <div class="stat transit ${state.view === 'transit' ? 'active' : ''}" onclick="setView('transit')">
      <div class="k">Transit</div>
      <div class="v num">${fmtCount(t.transit)}</div>
      <div class="indicator"></div>
    </div>
    <div class="stat problem ${state.view === 'problem' ? 'active' : ''}" onclick="setView('problem')">
      <div class="k">Problème</div>
      <div class="v num">${fmtCount(t.problem)}</div>
      <div class="indicator"></div>
    </div>
    <div class="stat pending ${state.view === 'pending' ? 'active' : ''}" onclick="setView('pending')">
      <div class="k">Attente</div>
      <div class="v num">${fmtCount(t.pending)}</div>
      <div class="indicator"></div>
    </div>
  `;
}

function setView(v) {
  state.view = v;
  renderMarkers();
}

// ═══════════════════════════════════════════════════════════════
//  DETAIL SHEET
// ═══════════════════════════════════════════════════════════════
function openWilaya(id) {
  const orders = state.data?.sheet?.recent_orders || [];
  const filtered = orders.filter(o => orderWilayaId(o) === id);
  const w = WILAYAS[id];
  const stats = { livre: 0, transit: 0, problem: 0, pending: 0 };
  filtered.forEach(o => { stats[classify(o)]++; });
  const total = filtered.length;

  const priority = { problem: 0, transit: 1, pending: 2, livre: 3 };
  const sorted = filtered.slice().sort((a, b) => {
    const pa = priority[classify(a)];
    const pb = priority[classify(b)];
    if (pa !== pb) return pa - pb;
    return new Date(b.date || 0) - new Date(a.date || 0);
  });

  // Close the leaflet popup, then open sheet
  state.map && state.map.closePopup();

  document.getElementById('sheet').innerHTML = `
    <div class="sheet-grab"></div>
    <div class="sheet-title">${escapeHtml(w.name)}</div>
    <div class="sheet-sub">${total} commande${total > 1 ? 's' : ''} · triées par urgence</div>
    <div class="sheet-stats">
      <div class="cell livre"><div class="k">Livré</div><div class="v num">${stats.livre}</div></div>
      <div class="cell transit"><div class="k">Transit</div><div class="v num">${stats.transit}</div></div>
      <div class="cell problem"><div class="k">Problème</div><div class="v num">${stats.problem}</div></div>
      <div class="cell pending"><div class="k">Attente</div><div class="v num">${stats.pending}</div></div>
    </div>
    <div class="orders-title">Commandes</div>
    ${sorted.slice(0, 150).map(o => {
      const cls = classify(o);
      return `
        <div class="order-item">
          <div class="status-pill ${cls}"></div>
          <div class="info">
            <div class="ref">${escapeHtml(o.order || '—')}</div>
            <div class="name">${escapeHtml(o.name || 'Sans nom')} · ${escapeHtml(o.commune || '')}</div>
            ${o.delivery_state ? `<div class="state">${escapeHtml(o.delivery_state)}</div>` : ''}
          </div>
          <div class="amt num">${Number(o.total || 0).toLocaleString('fr-FR')} DA</div>
        </div>
      `;
    }).join('')}
    ${sorted.length > 150 ? `<div class="empty">+ ${sorted.length - 150} autres commandes</div>` : ''}
  `;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isErr);
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════════════════════════
//  DATA CYCLE
// ═══════════════════════════════════════════════════════════════
async function refresh(deep) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  // Live-fetch from Anderson: 60 orders on quick refresh, 250 on deep
  const liveCount = deep ? 250 : 60;
  if (deep) toast('Sync Anderson en cours…');
  try {
    const data = await fetchFeed(liveCount);
    state.data = data;
    state.lastFetch = new Date();
    store.setCache(data);
    const t = state.lastFetch;
    document.getElementById('lastUpdated').textContent =
      `Anderson · ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    renderMarkers();
    if (deep) toast('✓ Sync terminé');
  } catch (err) {
    toast('Erreur: ' + err.message, true);
  } finally {
    setTimeout(() => btn.classList.remove('spin'), 900);
  }
}

// Long-press refresh button for deep sync (250 orders)
(function () {
  const btn = document.getElementById('refreshBtn');
  let t;
  btn.addEventListener('touchstart', () => { t = setTimeout(() => refresh(true), 550); }, { passive: true });
  btn.addEventListener('touchend', () => clearTimeout(t));
  btn.addEventListener('touchcancel', () => clearTimeout(t));
  btn.addEventListener('mousedown', () => { t = setTimeout(() => refresh(true), 550); });
  btn.addEventListener('mouseup', () => clearTimeout(t));
  btn.addEventListener('mouseleave', () => clearTimeout(t));
})();

// ═══════════════════════════════════════════════════════════════
//  MOUNT
// ═══════════════════════════════════════════════════════════════
initMap();
document.getElementById('refreshBtn').addEventListener('click', refresh);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

const cached = store.getCache();
if (cached) {
  state.data = cached.data;
  state.lastFetch = new Date(cached.t);
  const t = state.lastFetch;
  document.getElementById('lastUpdated').textContent =
    `Cache · ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  // Render markers once tiles start loading
  setTimeout(renderMarkers, 100);
}
refresh();

// Auto-refresh every 90s while tab visible
setInterval(() => { if (!document.hidden) refresh(); }, 90000);
</script>
